# /etc/our-box/autostart.conf — our-box container auto-start configuration
#
# List one container NAME per line to auto-start at boot.
# Empty lines and lines starting with '#' are ignored.
#
# Containers are started in order, sequentially, after systemd-machined is ready.
# A failure to start one container does NOT prevent the others from starting.
#
# The service (our-box-autostart.service) is only enabled during installation
# if this file contains at least one non-comment, non-empty entry.
#
# Example:
#   postgres
#   redis
#   nginx-proxy
