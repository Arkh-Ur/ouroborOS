  use_luks: false
  btrfs_label: ouroborOS
  swap_type: zram

locale:
  locale: en_US.UTF-8
  keymap: us
  timezone: America/Santiago

network:
  hostname: ouroboros
  enable_networkd: true
  enable_iwd: true
  enable_resolved: true

user:
  username: hbuddenberg
  password: 7907
  groups:
    - wheel
    - audio
    - video
    - input
  shell: /bin/bash

extra_packages:
  - openssh

post_install_action: shutdown
