# ouroborOS unattended installation configuration example
# Copy this file, fill in the required fields, and pass it to the installer:
#
#   ouroborOS-installer --config /path/to/my-config.yaml
#
# Or place it at one of the auto-detected locations:
#   /tmp/ouroborOS-config.yaml
#   /run/ouroborOS-config.yaml
#   A USB drive named ouroborOS-config.yaml

# --- Disk configuration ---
disk:
  # Target disk device (whole disk, not a partition)
  device: /dev/sda

  # Enable LUKS2 full-disk encryption (default: false)
  use_luks: false

  # Btrfs filesystem label (default: ouroborOS)
  btrfs_label: ouroborOS

  # Swap type: "zram" or "none"
  swap_type: zram

# --- Locale configuration ---
locale:
  # Locale (must be a valid locale string)
  locale: en_US.UTF-8

  # Console keymap
  keymap: us

  # Timezone (IANA timezone database format)
  timezone: UTC

# --- Network configuration ---
network:
  hostname: ouroboros
  enable_networkd: true
  enable_iwd: true
  enable_resolved: true

# --- User account ---
user:
  username: user

  # Password as SHA-512 crypt hash.
  # Generate with: python3 -c "import crypt; print(crypt.crypt('yourpassword', crypt.mksalt(crypt.METHOD_SHA512)))"
  # Or use 'password' field for plaintext (less secure, auto-hashed at install time):
  # password: changeme
  password_hash: "$6$rounds=656000$EXAMPLESALT$HASHHERE"

  # Additional groups (wheel enables sudo)
  groups:
    - wheel
    - audio
    - video
    - input

  shell: /bin/bash

# --- Extra packages (optional) ---
# extra_packages:
#   - neovim
#   - tmux
#   - openssh
