# /etc/bluetooth/main.conf — BlueZ configuration for ouroborOS
#
# Experimental LE features are required for FIDO2/WebAuthn over Bluetooth:
#
#   CTAP2 Hybrid Transport (QR code flow):
#     Chrome and Firefox use the BlueZ AdvertisingMonitor DBUS API to detect
#     phone authenticators advertising the FIDO2 caBLE (hybrid) tunnel service.
#     Without experimental mode, this API is unavailable and the QR code
#     passkey flow silently fails on Linux desktop.
#
#   FIDO2 BLE GATT Profile:
#     Physical BLE FIDO2 tokens (e.g., YubiKey 5Ci with BLE) expose the FIDO2
#     GATT service (UUID 0xFFFD). After pairing they appear as /dev/hidraw*
#     via HID-over-GATT (HOGP). The ExchangeMTU setting controls maximum
#     GATT packet size (517 bytes = BLE 5.0 max LE data length).
#
# References:
#   Arch Wiki — Bluetooth: https://wiki.archlinux.org/title/Bluetooth
#   CTAP2 Hybrid Transport: https://fidoalliance.org/specs/fido-v2.2/
#   BlueZ AdvertisingMonitor API: /usr/share/doc/bluez/advertising-monitor-api.txt

[General]
# Name published in Bluetooth advertisement (device display name)
# Name = ouroborOS

# Enable ALL BlueZ experimental D-Bus APIs.
# Required for:
#   - AdvertisingMonitor API (CTAP2 QR / hybrid transport)
#   - Advertisement patterns for proximity-based auth
#   - BLE audio (if applicable)
Experimental = true

# Enable kernel Bluetooth experimental features (BlueZ 5.64+, kernel 5.10+).
# Enables BT_KERN_EXP_FEATURE_MASK in the kernel BT stack.
# Required for ISO sockets (BLE audio) — harmless for FIDO2.
KernelExperimental = true

# Fast Connectable: put adapter in page scan mode optimised for faster BLE
# connection setup. Reduces CTAP2 BLE connection latency.
FastConnectable = true

[Policy]
# Power on the Bluetooth adapter automatically when bluetoothd starts.
# Allows FIDO2 BLE devices to reconnect after reboot without manual 'rfkill'.
AutoEnable = true

[LE]
# BLE connection parameters (units: 1.25ms each).
# 7 × 1.25ms = 8.75ms min interval — optimised for FIDO2 BLE CTAP2 latency.
# Spec CTAP2 BLE recommends ≤ 30ms interval for responsive authentication.
MinConnectionInterval = 6
MaxConnectionInterval = 9
ConnectionLatency = 0
ConnectionSupervisionTimeout = 100

# Advertising Monitor scan durations (milliseconds).
#
# AdvMonAllowlistScanDuration:
#   Time spent scanning when a registered allowlist pattern is being watched.
#   Chrome/Firefox register a pattern for the CTAP2 tunnel service UUID when
#   the user scans a QR code. A higher value means more reliable detection.
#   Default: 300ms. Increase if phone authenticator is not detected reliably.
AdvMonAllowlistScanDuration = 300

# AdvMonNoFilterScanDuration:
#   Time spent in passive (unfiltered) scan between allowlist scans.
#   Lower = faster detection of new advertisements. 10ms is the minimum.
AdvMonNoFilterScanDuration = 10

# EnableAdvMonInterleaveScan:
#   Interleave allowlist scan with passive scan so that general discovery
#   still works while waiting for a specific FIDO2 tunnel advertisement.
EnableAdvMonInterleaveScan = 1

[GATT]
# GATT attribute caching — required for stable FIDO2 BLE GATT sessions.
# Without caching, BlueZ re-discovers all GATT services on every reconnect,
# which adds latency and can cause CTAP2 timeout during authentication.
Cache = yes

# Key size for authenticated GATT operations (0 = use negotiated value).
KeySize = 0

# Maximum GATT PDU size.
# 517 bytes = BLE 5.0 LE Data Length Extension (DLE) maximum.
# Allows the FIDO2 GATT response to fit in a single BLE packet.
ExchangeMTU = 517

# Number of simultaneous GATT bearers per connection.
Channels = 3
