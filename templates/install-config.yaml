disk:
  device: /dev/vda
  use_luks: false
  btrfs_label: ouroborOS
  swap_type: zram

locale:
  locale: en_US.UTF-8
  keymap: us
  timezone: America/Santiago
  # TUI language for unattended installs. Options: en_US | es_CL | de_DE
  language: en_US

network:
  hostname: ouroboros
  enable_networkd: true
  enable_iwd: true
  enable_resolved: true
  # Optional: pre-configure WiFi for unattended installs.
  # If ssid is set, passphrase is required.
  # The passphrase is written to /var/lib/iwd/<SSID>.psk (chmod 600)
  # and cleared from memory immediately after. Never persisted in checkpoints.
  # wifi:
  #   ssid: "MyNetwork"
  #   passphrase: "my-secret-passphrase"
  # Optional: enable bluetooth.service post-install (requires bluez package).
  # bluetooth:
  #   enable: false

user:
  username: admin
  password: changeme
  groups:
    - wheel
    - audio
    - video
    - input
  # systemd-homed storage backend for the home directory.
  # Options: subvolume (default, Btrfs) | luks | directory | classic
  homed_storage: subvolume

# Login shell. Options: bash (default) | zsh | fish
# zsh and fish are installed automatically if selected.
shell: bash

# Desktop profile — a starting-point package set. Optional; defaults to
# "minimal" (no extra packages, TTY-only base) if omitted.
# Options: minimal | hyprland | niri | gnome | kde | cosmic
#
# dm: display manager (Wayland-native). "auto" picks the canonical DM for
# the profile (gnome→gdm, hyprland→sddm, niri→sddm, kde→plm, cosmic→greetd, rest→none).
# Override with: gdm | sddm | plm | greetd | none (TTY login).
#
# kde_flavor: Plasma meta-package (KDE profile only).
# Options: plasma-meta (default, ~1 GB) | plasma (full, ~1.5 GB) | plasma-desktop (minimal, ~400 MB)
#
# gpu_driver: GPU driver to install. "auto" detects via lspci.
# Options: auto | mesa | amdgpu | nvidia | nvidia-open | none
desktop:
  profile: minimal
  dm: auto
  kde_flavor: plasma-meta
  gpu_driver: auto

# Security settings. All optional; defaults to false.
# tpm2_unlock: bind LUKS to TPM2 PCR 7+14 for auto-unlock at boot.
#   Requires disk.use_luks: true. Falls back to passphrase if TPM2 absent.
# dual_boot: scan the ESP for other OS boot entries and configure systemd-boot
#   to show a selection menu. If Windows is detected, a boot entry is generated
#   automatically. When combined with secure_boot: true, Microsoft OEM keys are
#   included in the Secure Boot key enrollment (sbctl enroll-keys --microsoft).
# security:
#   secure_boot: false
#   tpm2_unlock: false
#   sbctl_include_ms_keys: false
#   fido2_pam: false
#   dual_boot: false

extra_packages:
  - openssh

# What to do after installation completes.
# Options: "reboot" (default), "shutdown", "none"
post_install_action: reboot
