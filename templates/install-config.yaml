disk:
  device: /dev/vda
  use_luks: false
  btrfs_label: ouroborOS
  swap_type: zram

locale:
  locale: en_US.UTF-8
  keymap: us
  timezone: America/Santiago

network:
  hostname: ouroboros
  enable_networkd: true
  enable_iwd: true
  enable_resolved: true
  # Optional: pre-configure WiFi for unattended installs.
  # If ssid is set, passphrase is required.
  # The passphrase is written to /var/lib/iwd/<SSID>.psk (chmod 600)
  # and cleared from memory immediately after. Never persisted in checkpoints.
  # wifi:
  #   ssid: "MyNetwork"
  #   passphrase: "my-secret-passphrase"
  # Optional: enable bluetooth.service post-install (requires bluez package).
  # bluetooth:
  #   enable: false

user:
  username: admin
  password: changeme
  groups:
    - wheel
    - audio
    - video
    - input
  # systemd-homed storage backend for the home directory.
  # Options: subvolume (default, Btrfs) | luks | directory | classic
  homed_storage: subvolume

# Login shell. Options: bash (default) | zsh | fish
# zsh and fish are installed automatically if selected.
shell: bash

# Desktop profile — a starting-point package set. Optional; defaults to
# "minimal" (no extra packages, TTY-only base) if omitted.
# Options: minimal | hyprland | niri | gnome | kde
#
# dm: display manager (Wayland-native). "auto" picks the canonical DM for
# the profile (gnome→gdm, hyprland→sddm, niri→sddm, kde→plm, rest→none).
# Override with gdm, sddm, plm, or none (TTY login).
desktop:
  profile: minimal
  dm: auto

extra_packages:
  - openssh

# What to do after installation completes.
# Options: "reboot" (default), "shutdown", "none"
post_install_action: reboot
