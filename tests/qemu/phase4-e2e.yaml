# ouroborOS E2E test config — Phase 4 feature validation
#
# Used by: sudo bash src/scripts/build-iso.sh --e2e-config=tests/qemu/phase4-e2e.yaml
# Tests Phase 4 features: our-aur, our-flat, systemd-sysext, firstboot AUR queue.
#
# QEMU constraints:
#   homed_storage: classic  — homectl create fails in QEMU (Btrfs subvolume conflict)
#   secure_boot: false      — sbctl requires real UEFI Setup Mode (OVMF limitation)
#   wifi: omitted           — iwd not used in QEMU SLIRP network
#   fido2_pam: false        — FIDO2 hardware token not available in QEMU
#
# our-aur internet tests (container build) are skipped if no internet.
# our-flat remote-add + install tests are skipped if no internet.

disk:
  device: /dev/vda
  use_luks: false
  btrfs_label: ouroborOS
  swap_type: zram

locale:
  locale: en_US.UTF-8
  keymap: us
  timezone: America/Santiago

network:
  hostname: ouroboros-p4
  enable_networkd: true
  enable_iwd: false
  enable_resolved: true

user:
  username: admin
  password: changeme
  groups:
    - wheel
    - audio
    - video
    - input
  homed_storage: classic

# Login shell — top-level key, short name
shell: bash

desktop:
  # Use minimal so AUR queue is empty — tests our-aur/our-flat in isolation,
  # not the firstboot pipeline (which would require internet during firstboot).
  profile: minimal
  dm: none

security:
  secure_boot: false
  sbctl_include_ms_keys: false
  fido2_pam: false

extra_packages:
  - openssh
  - flatpak          # required by our-flat (system-wide installation scope)

post_install_action: shutdown
