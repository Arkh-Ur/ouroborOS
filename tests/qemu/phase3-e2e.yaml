# ouroborOS E2E test config — Phase 3 feature validation
#
# Used by: sudo bash src/scripts/build-iso.sh --e2e-config=tests/qemu/phase3-e2e.yaml
# Tests all Phase 3 features: our-snapshot, our-rollback, our-wifi, our-bluetooth,
# our-fido2, ouroboros-secureboot, ouroboros-firstboot, shell selector.
#
# QEMU constraints:
#   homed_storage: classic  — homectl create fails in QEMU (Btrfs subvolume conflict)
#   secure_boot: false      — sbctl requires real UEFI Setup Mode (OVMF limitation)
#   wifi: omitted           — iwd not used in QEMU SLIRP network
#   fido2_pam: false        — FIDO2 hardware token not available in QEMU

disk:
  device: /dev/vda
  use_luks: false
  btrfs_label: ouroborOS
  swap_type: zram

locale:
  locale: en_US.UTF-8
  keymap: us
  timezone: America/Santiago

network:
  hostname: ouroboros-p3
  enable_networkd: true
  enable_iwd: false
  enable_resolved: true
  bluetooth:
    enable: true

user:
  username: admin
  password: changeme
  groups:
    - wheel
    - audio
    - video
    - input
  homed_storage: classic

# Login shell — top-level key, short name (Phase 3 schema)
# Valid: bash | zsh | fish
shell: bash

desktop:
  profile: minimal
  dm: none

security:
  secure_boot: false
  sbctl_include_ms_keys: false
  fido2_pam: false

extra_packages:
  - openssh

post_install_action: shutdown
