# ouroborOS E2E test config — Phase 5 feature validation
#
# Used by: sudo bash src/scripts/build-iso.sh --e2e-config=tests/qemu/phase5-e2e.yaml
# Tests Phase 5 features: system.yaml, .snapshot.yaml, multi-user, ouroboros-health.
#
# QEMU constraints:
#   homed_storage: classic  — homectl create fails in QEMU (Btrfs subvolume conflict)
#   secure_boot: false      — sbctl requires real UEFI Setup Mode (OVMF limitation)
#   wifi: omitted           — iwd not used in QEMU SLIRP network
#   fido2_pam: false        — FIDO2 hardware token not available in QEMU
#   tpm2_enroll: false      — TPM2 not available in QEMU without OVMF_VARS rw
#
# NOTE: users: list[UserConfig] requires v0.5.4 installer support.
# Until then, use user: (singular) form — backwards compatible.

disk:
  device: /dev/vda
  use_luks: false
  btrfs_label: ouroborOS
  swap_type: zram

locale:
  locale: es_AR.UTF-8
  keymap: la-latin1
  timezone: America/Santiago

network:
  hostname: ouroboros-p5
  enable_networkd: true
  enable_iwd: false
  enable_resolved: true

# Single user (v0.5.0-v0.5.3) — upgrades to users: list in v0.5.4
user:
  username: admin
  password: changeme
  groups:
    - wheel
    - audio
    - video
    - input
  homed_storage: classic    # QEMU constraint: homectl fails in virtual Btrfs

shell: bash

desktop:
  profile: minimal
  dm: none

security:
  secure_boot: false
  sbctl_include_ms_keys: false
  fido2_pam: false

extra_packages:
  - openssh

post_install_action: shutdown
