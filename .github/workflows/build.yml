name: Build ISO

on:
  push:
    branches: [dev, main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Branch / PR builds: validate only, no release ──────────────────────────
  build:
    name: Build ouroborOS ISO
    if: "!startsWith(github.ref, 'refs/tags/v')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Install build dependencies
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            archiso dosfstools e2fsprogs squashfs-tools \
            libisoburn git erofs-utils mtools gettext

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up loop devices
        run: |
          for i in $(seq 0 7); do
            mknod -m 660 "/dev/loop${i}" b 7 "${i}" 2>/dev/null || true
          done
          modprobe loop max_loop=8 2>/dev/null || true

      - name: Patch mkarchiso (workaround archiso #88 pipefail bug)
        run: |
          MKARCHISO="$(command -v mkarchiso)"
          awk '
          /^_make_efibootimg\(\)/ { in_func=1 }
          in_func && /^\}[[:space:]]*$/  { in_func=0 }
          in_func && /^[[:space:]]+\)"[[:space:]]*$/ { sub(/\)"[[:space:]]*$/, ")\" || true"); in_func=0 }
          { print }
          ' "$MKARCHISO" > "${MKARCHISO}.patched" && mv "${MKARCHISO}.patched" "$MKARCHISO" && chmod +x "$MKARCHISO"
          if ! grep -q '|| true' "$MKARCHISO"; then
            echo "::error::mkarchiso patch failed — archiso may have changed _make_efibootimg() indentation or structure"
            exit 1
          fi

      - name: Build ISO
        run: |
          bash src/scripts/build-iso.sh \
            --clean \
            --workdir /home/ouroborOS-build \
            --output out/

      - name: Generate SHA256 checksum
        run: |
          cd out/
          sha256sum ouroborOS-*.iso > ouroborOS-SHA256SUMS.txt
          cat ouroborOS-SHA256SUMS.txt

      - name: Verify ISO size (800 MiB – 2.5 GiB)
        run: |
          ISO=$(ls out/ouroborOS-*.iso | head -n 1)
          SIZE=$(stat -c%s "$ISO")
          MIN=$((800 * 1024 * 1024))
          MAX=$((2560 * 1024 * 1024))
          echo "ISO size: $(( SIZE / 1024 / 1024 )) MiB"
          if [[ $SIZE -lt $MIN ]]; then
            echo "::error::ISO too small: $(( SIZE / 1024 / 1024 )) MiB (min 800 MiB)"
            exit 1
          fi
          if [[ $SIZE -gt $MAX ]]; then
            echo "::error::ISO too large: $(( SIZE / 1024 / 1024 )) MiB (max 2560 MiB)"
            exit 1
          fi
          echo "ISO size OK."

      - name: Write build summary
        if: always()
        run: |
          ISO=$(ls out/ouroborOS-*.iso 2>/dev/null | head -n 1 || echo "not built")
          SIZE_MB=0
          if [[ -f "$ISO" ]]; then SIZE_MB=$(( $(stat -c%s "$ISO") / 1024 / 1024 )); fi
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## ouroborOS ISO Build

          | Field | Value |
          |-------|-------|
          | Branch | \`${{ github.ref_name }}\` |
          | Commit | \`${{ github.sha }}\` |
          | ISO    | \`$(basename "$ISO" 2>/dev/null || echo "N/A")\` |
          | Size   | ${SIZE_MB} MiB |
          | SHA256 | \`$(awk '{print $1}' out/ouroborOS-SHA256SUMS.txt 2>/dev/null || echo "N/A")\` |
          EOF

  # ── Release builds: build + push to public repo + GitHub Release ──────────
  release:
    name: Build ISO and Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Install build dependencies
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            archiso dosfstools e2fsprogs squashfs-tools \
            libisoburn git erofs-utils mtools gettext github-cli

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up loop devices
        run: |
          for i in $(seq 0 7); do
            mknod -m 660 "/dev/loop${i}" b 7 "${i}" 2>/dev/null || true
          done
          modprobe loop max_loop=8 2>/dev/null || true

      - name: Patch mkarchiso (workaround archiso #88 pipefail bug)
        run: |
          MKARCHISO="$(command -v mkarchiso)"
          awk '
          /^_make_efibootimg\(\)/ { in_func=1 }
          in_func && /^\}[[:space:]]*$/  { in_func=0 }
          in_func && /^[[:space:]]+\)"[[:space:]]*$/ { sub(/\)"[[:space:]]*$/, ")\" || true"); in_func=0 }
          { print }
          ' "$MKARCHISO" > "${MKARCHISO}.patched" && mv "${MKARCHISO}.patched" "$MKARCHISO" && chmod +x "$MKARCHISO"
          if ! grep -q '|| true' "$MKARCHISO"; then
            echo "::error::mkarchiso patch failed — archiso may have changed _make_efibootimg() indentation or structure"
            exit 1
          fi

      - name: Build ISO
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          bash src/scripts/build-iso.sh \
            --clean \
            --workdir /home/ouroborOS-build \
            --output out/ \
            --version="${VERSION}"

      - name: Generate SHA256 checksum
        run: |
          cd out/
          sha256sum ouroborOS-*.iso > ouroborOS-SHA256SUMS.txt
          cat ouroborOS-SHA256SUMS.txt

      - name: Verify ISO size (800 MiB – 2.5 GiB)
        run: |
          ISO=$(ls out/ouroborOS-*.iso | head -n 1)
          SIZE=$(stat -c%s "$ISO")
          MIN=$((800 * 1024 * 1024))
          MAX=$((2560 * 1024 * 1024))
          echo "ISO size: $(( SIZE / 1024 / 1024 )) MiB"
          if [[ $SIZE -lt $MIN ]]; then
            echo "::error::ISO too small: $(( SIZE / 1024 / 1024 )) MiB (min 800 MiB)"
            exit 1
          fi
          if [[ $SIZE -gt $MAX ]]; then
            echo "::error::ISO too large: $(( SIZE / 1024 / 1024 )) MiB (max 2560 MiB)"
            exit 1
          fi
          echo "ISO size OK."

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          NOTES=$(awk \
            "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md)

          if [[ -z "$NOTES" ]]; then
            echo "::warning::No CHANGELOG entry found for ${VERSION} — using empty notes"
            NOTES="See [CHANGELOG.md](https://github.com/Arkh-Ur/ouroborOS/blob/main/CHANGELOG.md) for details."
          fi

          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo ""
            echo "---"
            echo ""
            echo "### Installation"
            echo ""
            echo "1. Download the ISO below and verify the checksum:"
            echo '   ```bash'
            echo "   sha256sum -c ouroborOS-SHA256SUMS.txt"
            echo '   ```'
            echo "2. Flash to USB:"
            echo '   ```bash'
            echo "   sudo bash src/scripts/flash-usb.sh --iso ouroborOS-*.iso"
            echo '   ```'
            echo "3. Boot from USB (UEFI required) and follow the installer."
            echo ""
            echo "Full changelog: [CHANGELOG.md](https://github.com/Arkh-Ur/ouroborOS/blob/main/CHANGELOG.md)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Push main and tag to public repo
        env:
          PUBLIC_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          if [[ -z "$PUBLIC_TOKEN" ]]; then
            echo "PUBLIC_REPO_TOKEN not set — skipping push to public repo"
            exit 0
          fi
          git config --global --add safe.directory '*'
          git remote add public \
            "https://x-access-token:${PUBLIC_TOKEN}@github.com/Arkh-Ur/ouroborOS.git"
          git push public "HEAD:refs/heads/main" --force
          git push public "${{ github.ref }}" --force

      - name: Create or update GitHub Release in public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          RELEASE_NOTES: ${{ steps.notes.outputs.NOTES }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "PUBLIC_REPO_TOKEN not set — skipping release creation"
            exit 0
          fi
          TAG="${{ github.ref_name }}"
          ISO=$(ls out/ouroborOS-*.iso | head -n 1)
          CHECKSUM="out/ouroborOS-SHA256SUMS.txt"

          # Delete existing release if present (supports hotfix re-runs)
          if gh release view "$TAG" --repo Arkh-Ur/ouroborOS >/dev/null 2>&1; then
            echo "Release $TAG already exists — deleting and recreating"
            gh release delete "$TAG" --repo Arkh-Ur/ouroborOS --yes --cleanup-tag 2>/dev/null || true
            git push public "refs/tags/${TAG}" --force
          fi

          gh release create "$TAG" \
            --repo Arkh-Ur/ouroborOS \
            --title "ouroborOS ${TAG}" \
            --target main \
            --prerelease \
            --notes "$RELEASE_NOTES" \
            "$ISO" \
            "$CHECKSUM"

      - name: Write build summary
        if: always()
        run: |
          ISO=$(ls out/ouroborOS-*.iso 2>/dev/null | head -n 1 || echo "not built")
          SIZE_MB=0
          if [[ -f "$ISO" ]]; then SIZE_MB=$(( $(stat -c%s "$ISO") / 1024 / 1024 )); fi
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## ouroborOS ${TAG} Release Build

          | Field | Value |
          |-------|-------|
          | Tag    | \`${{ github.ref_name }}\` |
          | Commit | \`${{ github.sha }}\` |
          | ISO    | \`$(basename "$ISO" 2>/dev/null || echo "N/A")\` |
          | Size   | ${SIZE_MB} MiB |
          | SHA256 | \`$(awk '{print $1}' out/ouroborOS-SHA256SUMS.txt 2>/dev/null || echo "N/A")\` |
          | Public | https://github.com/Arkh-Ur/ouroborOS/releases/tag/${{ github.ref_name }} |
          EOF

  # aarch64 / ARM64 support removed in v0.4.12 — no hardware for validation.
