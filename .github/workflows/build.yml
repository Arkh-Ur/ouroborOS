name: Build ISO

on:
  push:
    branches: [dev]
    tags: ["v*"]
  pull_request:
    branches: [dev]
  workflow_dispatch:

jobs:
  # ── Branch / PR builds: validate only, no release ──────────────────────────
  build:
    name: Build ouroborOS ISO
    if: "!startsWith(github.ref, 'refs/tags/v')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Install build dependencies
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            archiso dosfstools e2fsprogs squashfs-tools \
            libisoburn git erofs-utils mtools gettext

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up loop devices
        run: |
          for i in $(seq 0 7); do
            mknod -m 660 "/dev/loop${i}" b 7 "${i}" 2>/dev/null || true
          done
          modprobe loop max_loop=8 2>/dev/null || true

      - name: Patch mkarchiso (workaround archiso #88 pipefail bug)
        run: |
          MKARCHISO="$(command -v mkarchiso)"
          awk '
          /^_make_efibootimg\(\)/ { in_func=1 }
          in_func && /^\}[[:space:]]*$/  { in_func=0 }
          in_func && /^[[:space:]]+\)"[[:space:]]*$/ { sub(/\)"[[:space:]]*$/, ")\" || true"); in_func=0 }
          { print }
          ' "$MKARCHISO" > "${MKARCHISO}.patched" && mv "${MKARCHISO}.patched" "$MKARCHISO" && chmod +x "$MKARCHISO"
          if ! grep -q '|| true' "$MKARCHISO"; then
            echo "::error::mkarchiso patch failed — archiso may have changed _make_efibootimg() indentation or structure"
            exit 1
          fi

      - name: Build ISO
        run: |
          bash src/scripts/build-iso.sh \
            --clean \
            --workdir /home/ouroborOS-build \
            --output out/

      - name: Generate SHA256 checksum
        run: |
          cd out/
          sha256sum ouroborOS-*.iso > ouroborOS-SHA256SUMS.txt
          cat ouroborOS-SHA256SUMS.txt

      - name: Verify ISO size (800 MiB – 2.5 GiB)
        run: |
          ISO=$(ls out/ouroborOS-*.iso | head -n 1)
          SIZE=$(stat -c%s "$ISO")
          MIN=$((800 * 1024 * 1024))
          MAX=$((2560 * 1024 * 1024))
          echo "ISO size: $(( SIZE / 1024 / 1024 )) MiB"
          if [[ $SIZE -lt $MIN ]]; then
            echo "::error::ISO too small: $(( SIZE / 1024 / 1024 )) MiB (min 800 MiB)"
            exit 1
          fi
          if [[ $SIZE -gt $MAX ]]; then
            echo "::error::ISO too large: $(( SIZE / 1024 / 1024 )) MiB (max 2560 MiB)"
            exit 1
          fi
          echo "ISO size OK."

      - name: Write build summary
        if: always()
        run: |
          ISO=$(ls out/ouroborOS-*.iso 2>/dev/null | head -n 1 || echo "not built")
          SIZE_MB=0
          if [[ -f "$ISO" ]]; then SIZE_MB=$(( $(stat -c%s "$ISO") / 1024 / 1024 )); fi
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## ouroborOS ISO Build

          | Field | Value |
          |-------|-------|
          | Branch | \`${{ github.ref_name }}\` |
          | Commit | \`${{ github.sha }}\` |
          | ISO    | \`$(basename "$ISO" 2>/dev/null || echo "N/A")\` |
          | Size   | ${SIZE_MB} MiB |
          | SHA256 | \`$(awk '{print $1}' out/ouroborOS-SHA256SUMS.txt 2>/dev/null || echo "N/A")\` |
          EOF

  # ── Release builds: build + push to public repo + GitHub Release ──────────
  release:
    name: Build ISO and Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Install build dependencies
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            archiso dosfstools e2fsprogs squashfs-tools \
            libisoburn git erofs-utils mtools gettext github-cli

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up loop devices
        run: |
          for i in $(seq 0 7); do
            mknod -m 660 "/dev/loop${i}" b 7 "${i}" 2>/dev/null || true
          done
          modprobe loop max_loop=8 2>/dev/null || true

      - name: Patch mkarchiso (workaround archiso #88 pipefail bug)
        run: |
          MKARCHISO="$(command -v mkarchiso)"
          awk '
          /^_make_efibootimg\(\)/ { in_func=1 }
          in_func && /^\}[[:space:]]*$/  { in_func=0 }
          in_func && /^[[:space:]]+\)"[[:space:]]*$/ { sub(/\)"[[:space:]]*$/, ")\" || true"); in_func=0 }
          { print }
          ' "$MKARCHISO" > "${MKARCHISO}.patched" && mv "${MKARCHISO}.patched" "$MKARCHISO" && chmod +x "$MKARCHISO"
          if ! grep -q '|| true' "$MKARCHISO"; then
            echo "::error::mkarchiso patch failed — archiso may have changed _make_efibootimg() indentation or structure"
            exit 1
          fi

      - name: Build ISO (online)
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          bash src/scripts/build-iso.sh \
            --clean \
            --workdir /home/ouroborOS-build \
            --output out/ \
            --version="${VERSION}"

      - name: Rename online ISO
        run: |
          ISO=$(ls out/ouroborOS-*.iso | head -n 1)
          EXT="${ISO##*.}"
          BASE="${ISO%.*}"
          mv "$ISO" "${BASE}-online.${EXT}"

      - name: Build ISO (offline cache)
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          bash src/scripts/build-iso.sh \
            --clean \
            --with-cache \
            --workdir /home/ouroborOS-build \
            --output out/ \
            --version="${VERSION}"

      - name: Rename offline ISO
        run: |
          ISO=$(ls out/ouroborOS-*.iso | grep -v online | head -n 1)
          EXT="${ISO##*.}"
          BASE="${ISO%.*}"
          mv "$ISO" "${BASE}-offline.${EXT}"

      - name: Generate channels/stable.yaml
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          RELEASED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          PKGS=$(grep -v '^#' src/ouroborOS-profile/packages.x86_64 | grep -v '^$' | sort | sed 's/^/  - /')
          cat > channels/stable.yaml <<CHANEOF
          # channels/stable.yaml — ouroborOS OTA stable channel
          # Generated automatically by CI on tag ${TAG}
          version: ${VERSION}
          released: ${RELEASED}
          min_compatible_version: 0.5.0
          changelog_url: https://github.com/Arkh-Ur/ouroborOS/releases/tag/${TAG}
          base_packages:
          ${PKGS}
          CHANEOF
          cat channels/stable.yaml

      - name: Generate SHA256 checksums
        run: |
          cd out/
          sha256sum ouroborOS-*.iso > ouroborOS-SHA256SUMS.txt
          cat ouroborOS-SHA256SUMS.txt

      - name: Verify ISO sizes
        run: |
          for ISO in out/ouroborOS-*.iso; do
            SIZE=$(stat -c%s "$ISO")
            SIZE_MB=$(( SIZE / 1024 / 1024 ))
            echo "$(basename "$ISO"): ${SIZE_MB} MiB"
            if [[ $SIZE -lt $((800 * 1024 * 1024)) ]]; then
              echo "::error::$(basename "$ISO") too small: ${SIZE_MB} MiB (min 800 MiB)"
              exit 1
            fi
            if [[ $SIZE -gt $((5000 * 1024 * 1024)) ]]; then
              echo "::error::$(basename "$ISO") too large: ${SIZE_MB} MiB (max 5000 MiB)"
              exit 1
            fi
          done
          echo "All ISO sizes OK."

      - name: Create prerelease in private repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory '*'
          TAG="${{ github.ref_name }}"
          ISO_ONLINE=$(ls out/ouroborOS-*-online.iso | head -n 1)
          ISO_OFFLINE=$(ls out/ouroborOS-*-offline.iso | head -n 1)
          CHECKSUM="out/ouroborOS-SHA256SUMS.txt"
          ASSETS=("$ISO_ONLINE" "$CHECKSUM")
          OFFLINE_SIZE=$(stat -c%s "$ISO_OFFLINE")
          if [[ $OFFLINE_SIZE -gt 2147483648 ]]; then
            echo "Offline ISO ($(( OFFLINE_SIZE / 1024 / 1024 )) MiB) exceeds GitHub 2 GiB limit — compressing"
            gzip -9 "$ISO_OFFLINE"
            ISO_OFFLINE="${ISO_OFFLINE}.gz"
          fi
          ASSETS+=("$ISO_OFFLINE")
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Prerelease $TAG already exists — deleting and recreating"
            gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          fi
          gh release create "$TAG" \
            --title "ouroborOS ${TAG} (Alpha)" \
            --prerelease \
            --notes "Pre-release build from tag ${TAG}. Mirror to public repo follows." \
            "${ASSETS[@]}"

      - name: Merge tag to origin/main (private)
        run: |
          git config --global --add safe.directory '*'
          git config user.name "ouroborOS CI"
          git config user.email "ci@ouroboros.dev"
          # Preserve generated channels file across checkout
          cp channels/stable.yaml /tmp/stable.yaml
          git fetch origin main
          git checkout main
          git merge --ff-only "$GITHUB_SHA" || git merge --no-ff "$GITHUB_SHA" -m "release: merge tag ${{ github.ref_name }} to main"
          cp /tmp/stable.yaml channels/stable.yaml
          git add channels/stable.yaml
          git diff --cached --quiet || git commit -m "chore(channels): update stable.yaml for ${{ github.ref_name }}"
          git push origin main

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          NOTES=$(awk \
            "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md)

          if [[ -z "$NOTES" ]]; then
            echo "::warning::No CHANGELOG entry found for ${VERSION} — using empty notes"
            NOTES="See [CHANGELOG.md](https://github.com/Arkh-Ur/ouroborOS/blob/main/CHANGELOG.md) for details."
          fi

          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo ""
            echo "---"
            echo ""
            echo "### Installation"
            echo ""
            echo "Two ISO variants are available:"
            echo ""
            echo "- **`-online.iso`** (~1.4 GB) — requires internet during install. Smaller download, fits on 4 GB USB."
            echo "- **`-offline.iso.gz`** (~2.5 GB compressed) — includes package cache for fully offline install. Decompress with \`gunzip\` before flashing."
            echo ""
            echo "1. Download the desired ISO and verify the checksum:"
            echo '   ```bash'
            echo "   sha256sum -c ouroborOS-SHA256SUMS.txt"
            echo '   ```'
            echo "2. If using the offline ISO, decompress first:"
            echo '   ```bash'
            echo "   gunzip ouroborOS-*-offline.iso.gz"
            echo '   ```'
            echo "3. Flash to USB:"
            echo '   ```bash'
            echo "   sudo bash src/scripts/flash-usb.sh --iso ouroborOS-*.iso"
            echo '   ```'
            echo "4. Boot from USB (UEFI required) and follow the installer."
            echo ""
            echo "Full changelog: [CHANGELOG.md](https://github.com/Arkh-Ur/ouroborOS/blob/main/CHANGELOG.md)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Push main and tag to public repo
        env:
          PUBLIC_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          if [[ -z "$PUBLIC_TOKEN" ]]; then
            echo "PUBLIC_REPO_TOKEN not set — skipping push to public repo"
            exit 0
          fi
          git remote add public \
            "https://x-access-token:${PUBLIC_TOKEN}@github.com/Arkh-Ur/ouroborOS.git"
          git push public "refs/heads/main" --force
          git push public "${{ github.ref }}" --force

      - name: Create or update GitHub Release in public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          RELEASE_NOTES: ${{ steps.notes.outputs.NOTES }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "PUBLIC_REPO_TOKEN not set — skipping release creation"
            exit 0
          fi
          TAG="${{ github.ref_name }}"
          ISO_ONLINE=$(ls out/ouroborOS-*-online.iso | head -n 1)
          ISO_OFFLINE=$(ls out/ouroborOS-*-offline.iso.gz out/ouroborOS-*-offline.iso 2>/dev/null | head -n 1)
          CHECKSUM="out/ouroborOS-SHA256SUMS.txt"
          ASSETS=("$ISO_ONLINE" "$CHECKSUM" "$ISO_OFFLINE")

          if gh release view "$TAG" --repo Arkh-Ur/ouroborOS >/dev/null 2>&1; then
            echo "Release $TAG already exists — deleting and recreating"
            gh release delete "$TAG" --repo Arkh-Ur/ouroborOS --yes --cleanup-tag 2>/dev/null || true
            git push public "refs/tags/${TAG}" --force
          fi

          gh release create "$TAG" \
            --repo Arkh-Ur/ouroborOS \
            --title "ouroborOS ${TAG} (Alpha)" \
            --target main \
            --prerelease \
            --notes "$RELEASE_NOTES" \
            "${ASSETS[@]}"

      - name: Write build summary
        if: always()
        run: |
          ISO=$(ls out/ouroborOS-*.iso 2>/dev/null | head -n 1 || echo "not built")
          SIZE_MB=0
          if [[ -f "$ISO" ]]; then SIZE_MB=$(( $(stat -c%s "$ISO") / 1024 / 1024 )); fi
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## ouroborOS ${TAG} Release Build

          | Field | Value |
          |-------|-------|
          | Tag    | \`${{ github.ref_name }}\` |
          | Commit | \`${{ github.sha }}\` |
          | ISO    | \`$(basename "$ISO" 2>/dev/null || echo "N/A")\` |
          | Size   | ${SIZE_MB} MiB |
          | SHA256 | \`$(awk '{print $1}' out/ouroborOS-SHA256SUMS.txt 2>/dev/null || echo "N/A")\` |
          | Public | https://github.com/Arkh-Ur/ouroborOS/releases/tag/${{ github.ref_name }} |
          EOF

  # aarch64 / ARM64 support removed in v0.4.12 — no hardware for validation.
